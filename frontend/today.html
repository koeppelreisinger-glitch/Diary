<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>今日 — Echo</title>
    <meta name="description" content="Echo 今日记录">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ══ 底部弹层 ══ */
        .diary-sheet-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 800;
        }

        .diary-sheet {
            display: none;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(100vw, 430px);
            background: #FAFAF7;
            border-radius: 28px 28px 0 0;
            z-index: 801;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.18);
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: max(28px, env(safe-area-inset-bottom));
        }

        .diary-sheet.open {
            display: block;
            animation: sheetSlideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes sheetSlideUp {
            from {
                transform: translateX(-50%) translateY(100%);
            }

            to {
                transform: translateX(-50%) translateY(0);
            }
        }

        .sheet-handle {
            width: 42px;
            height: 5px;
            background: #E0DDD8;
            border-radius: 999px;
            margin: 14px auto 4px;
        }

        .sheet-close-floating {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: flex-end;
            padding: 0 16px 6px;
            background: linear-gradient(to bottom, #FAFAF7 70%, transparent);
            z-index: 1;
        }

        .sheet-close-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.07);
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ══ 编辑面板 ══ */
        .ep {
            margin: 6px 16px 0;
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--border);
        }

        .ep-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .ep-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .ep-textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: var(--font-family);
            color: var(--text-primary);
            line-height: 1.75;
            resize: vertical;
            min-height: 130px;
            outline: none;
        }

        .ep-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.12);
        }

        .ep-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .ep-status {
            font-size: 12px;
            margin-top: 6px;
        }

        .ep-status.ok {
            color: var(--success);
        }

        .ep-status.err {
            color: #e74c3c;
        }

        /* ══ 补充对话面板 ══ */
        .sp {
            margin: 14px 16px 0;
            background: linear-gradient(135deg, #f8f6ff, #fef9f0);
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid #e8e0f5;
        }

        .sp-title {
            font-size: 14px;
            font-weight: 800;
            color: #7B6EC6;
            margin-bottom: 10px;
        }

        .sp-msgs {
            max-height: 160px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .sp-msg {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .sp-msg-ico {
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .sp-msg-bubble {
            background: #fff;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-primary);
            border: 1px solid var(--border);
            flex: 1;
            word-break: break-word;
        }

        .sp-msg.user .sp-msg-bubble {
            background: var(--accent-light);
            border-color: rgba(245, 166, 35, 0.3);
        }

        .sp-input-row {
            display: flex;
            gap: 8px;
        }

        .sp-input {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 13px;
            font-family: var(--font-family);
            outline: none;
        }

        .sp-input:focus {
            border-color: #9D8FE0;
        }

        .sp-input:disabled {
            background: var(--bg-secondary);
        }

        .sp-save-row {
            margin-top: 10px;
            display: none;
        }

        .sp-status {
            font-size: 12px;
            margin-top: 6px;
        }

        .sp-status.ok {
            color: var(--success);
        }

        .sp-status.err {
            color: #e74c3c;
        }

        .today-panels {
            padding: 0 16px;
        }
    </style>
</head>

    <script>
        if (!requireAuth()) { }
        else { initDateLabel(); initPage(); }

        let _recordDates = new Set();

        async function initPage() {
            const now = new Date();
            const [userRes, calRes] = await Promise.allSettled([
                apiFetch('/users/me'),
                apiFetch(`/history/calendar?year=${now.getFullYear()}&month=${now.getMonth() + 1}`)
            ]);
            if (userRes.status === 'fulfilled') {
                const u = userRes.value;
                const nick = u.nickname || u.phone || '你';
                document.getElementById('greetingTitle').textContent = getGreeting() + '，' + nick;
                document.getElementById('avatarEl').textContent = nick.charAt(0);
            } else {
                document.getElementById('greetingTitle').textContent = getGreeting() + ' 👋';
            }
            if (calRes.status === 'fulfilled') {
                (calRes.value.days || []).forEach(d => _recordDates.add(d.record_date));
            }
            buildDateStrip(_recordDates);
            initTodayPage();
        }

        function getGreeting() {
            const h = new Date().getHours();
            if (h >= 5 && h < 9) return '早上好 🌅';
            if (h >= 9 && h < 12) return '上午好 ☀️';
            if (h >= 12 && h < 14) return '中午好 🌤️';
            if (h >= 14 && h < 18) return '下午好 ✨';
            if (h >= 18 && h < 22) return '晚上好 🌙';
            return '夜深了，注意休息 🌟';
        }

        function buildDateStrip(recordDates = new Set()) {
            const strip = document.getElementById('dateStrip');
            if (!strip) return;
            strip.innerHTML = '';
            const labels = ['日', '一', '二', '三', '四', '五', '六'];
            const today = new Date();
            const todayStr = today.toISOString().slice(0, 10);
            for (let i = -3; i <= 3; i++) {
                const d = new Date(today); d.setDate(today.getDate() + i);
                const dateStr = d.toISOString().slice(0, 10);
                const isToday = dateStr === todayStr;
                const hasRec = recordDates.has(dateStr);
                const div = document.createElement('div');
                div.className = 'date-day' + (isToday ? ' today' : '') + (hasRec && !isToday ? ' has-record' : '');
                div.style.cursor = 'pointer';
                div.innerHTML = `<span class="date-day-label">${labels[d.getDay()]}</span><span class="date-day-num">${d.getDate()}</span>`;
                div.addEventListener('click', () => {
                    if (isToday) {
                        // 点今天：关闭历史/未来面板，恢复主内容
                        closeHistPanel(); closeFuturePanel();
                        const panels = document.getElementById('todayInlinePanels');
                        if (panels && panels.style.display !== 'none') {
                            panels.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    } else if (dateStr > todayStr) {
                        openFuturePanel(dateStr);
                    } else {
                        openHistPanel(dateStr);
                    }
                });
                strip.appendChild(div);
            }
        }

        function scrollToJournal() {
            const stage = document.getElementById('todayStage');
            if (stage) stage.scrollIntoView({ behavior: 'smooth' });
            const btn = stage && stage.querySelector('[onclick="startTodayConversation()"]');
            if (btn) setTimeout(() => btn.click(), 400);
        }

        // ══════════════════════════════════════════════════════
        //  历史日期内联面板
        // ══════════════════════════════════════════════════════
        const histState = { record: null, convId: null, dateStr: null };

        async function openHistPanel(dateStr) {
            closeFuturePanel();
            histState.record = null; histState.convId = null; histState.dateStr = dateStr;
            document.getElementById('histPanelDate').textContent = dateStr;
            document.getElementById('histBodyHint').textContent = '加载中…';
            document.getElementById('histBodyContent').innerHTML =
                '<div style="padding:16px 0;text-align:center"><div class="loading-spinner"></div></div>';
            document.getElementById('histBodyActions').innerHTML = '';
            setSt('histBodySt', '', '');
            document.getElementById('histSuppMsgs').innerHTML = '';
            document.getElementById('histSuppSaveRow').style.display = 'none';
            setSt('histSuppSt', '', '');
            document.getElementById('histSuppInput').disabled = true;
            document.getElementById('histSuppSendBtn').disabled = true;

            const panel = document.getElementById('histPanel');
            panel.style.display = 'block';
            // 隐藏主内容
            document.getElementById('todayMainContent').style.display = 'none';
            panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

            try {
                const rec = await apiFetch('/history/daily-records/' + dateStr);
                histState.record = rec;
                histState.convId = rec.conversation_id;
                _renderHistHasRecord(rec);
            } catch (e) {
                _renderHistNoRecord();
            }
        }

        function closeHistPanel() {
            document.getElementById('histPanel').style.display = 'none';
            document.getElementById('todayMainContent').style.display = 'block';
        }

        function openFuturePanel(dateStr) {
            closeHistPanel();
            document.getElementById('futurePanelDate').textContent = dateStr;
            document.getElementById('futurePanel').style.display = 'block';
            document.getElementById('todayMainContent').style.display = 'none';
            document.getElementById('futurePanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closeFuturePanel() {
            document.getElementById('futurePanel').style.display = 'none';
            document.getElementById('todayMainContent').style.display = 'block';
        }

        // ── 日历选择器 ──────────────────────────────────────────
        function openCalPicker() {
            const input = document.getElementById('calPickerInput');
            if (!input) return;
            // 默认显示今天
            input.value = new Date().toISOString().slice(0, 10);
            if (input.showPicker) {
                input.showPicker();
            } else {
                input.click();
            }
        }

        function handlePickerDate(dateStr) {
            if (!dateStr) return;
            const todayStr = new Date().toISOString().slice(0, 10);
            if (dateStr === todayStr) {
                closeHistPanel(); closeFuturePanel();
                const panels = document.getElementById('todayInlinePanels');
                if (panels && panels.style.display !== 'none') {
                    panels.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } else if (dateStr > todayStr) {
                openFuturePanel(dateStr);
            } else {
                openHistPanel(dateStr);
            }
        }

        function _renderHistHasRecord(rec) {
            document.getElementById('histBodyHint').textContent = '直接编辑，不会触发 AI';
            document.getElementById('histBodyContent').innerHTML =
                '<textarea class="ep-textarea" id="histBodyTA" rows="10" placeholder="日记正文内容…">' +
                escapeHtml(rec.body_text || rec.summary_text || '') + '</textarea>';
            document.getElementById('histBodyActions').innerHTML =
                '<button class="btn btn-primary" onclick="histSaveBody()" id="histSaveBodyBtn">💾 保存正文</button>' +
                '<button class="btn btn-secondary" onclick="histRegenBody()" id="histRegenBtn">🤖 AI 重新生成</button>';
            document.getElementById('histSuppInput').disabled = false;
            document.getElementById('histSuppSendBtn').disabled = false;
            document.getElementById('histSuppInput').placeholder = '输入补充内容…';
        }

        function _renderHistNoRecord() {
            document.getElementById('histBodyHint').textContent = '输入正文后保存，即可为这一天创建日记';
            document.getElementById('histBodyContent').innerHTML =
                '<textarea class="ep-textarea" id="histBodyTA" rows="10" placeholder="写下这一天发生的事…"></textarea>';
            document.getElementById('histBodyActions').innerHTML =
                '<button class="btn btn-primary" onclick="histSaveBody()" id="histSaveBodyBtn">💾 保存正文</button>';
            document.getElementById('histSuppInput').disabled = true;
            document.getElementById('histSuppSendBtn').disabled = true;
            document.getElementById('histSuppInput').placeholder = '请先保存正文，再来补充';
        }

        async function histSaveBody() {
            const ta = document.getElementById('histBodyTA');
            const txt = ta ? ta.value.trim() : '';
            if (!txt) { setSt('histBodySt', '❌ 正文不能为空', 'err'); return; }
            const btn = document.getElementById('histSaveBodyBtn');
            btn.disabled = true; btn.textContent = '保存中…'; setSt('histBodySt', '保存中…', '');
            try {
                if (!histState.record) {
                    const created = await apiFetch('/daily-records/manual', {
                        method: 'POST',
                        body: JSON.stringify({ record_date: histState.dateStr, body_text: txt })
                    });
                    histState.record = created; histState.convId = created.conversation_id;
                    _renderHistHasRecord(created);
                    const newTa = document.getElementById('histBodyTA');
                    if (newTa && created.body_text) newTa.value = created.body_text;
                    setSt('histBodySt', '✅ 日记已创建，结构化数据已同步', 'ok');
                    _recordDates.add(histState.dateStr); buildDateStrip(_recordDates);
                } else {
                    await apiFetch('/daily-records/' + histState.record.id + '/body', {
                        method: 'PUT', body: JSON.stringify({ body_text: txt })
                    });
                    setSt('histBodySt', '✅ 已保存', 'ok');
                }
            } catch (e) { setSt('histBodySt', '❌ ' + e.message, 'err'); }
            finally { const b = document.getElementById('histSaveBodyBtn'); if(b){b.disabled=false;b.textContent='💾 保存正文';} }
        }

        async function histRegenBody() {
            const r = histState.record; if (!r) return;
            if (!confirm('确定让 AI 重新生成日记正文？每次会调整叙述风格和修辞。')) return;
            const btn = document.getElementById('histRegenBtn');
            btn.disabled = true; btn.textContent = '生成中…'; setSt('histBodySt', 'AI 生成中…', '');
            try {
                const updated = await apiFetch('/daily-records/' + r.id + '/supplement', { method: 'POST', body: JSON.stringify({}) });
                const ta = document.getElementById('histBodyTA');
                if (ta && updated && updated.body_text) ta.value = updated.body_text;
                setSt('histBodySt', '✅ 已重新生成', 'ok');
            } catch (e) { setSt('histBodySt', '❌ ' + e.message, 'err'); }
            finally { const b = document.getElementById('histRegenBtn'); if(b){b.disabled=false;b.textContent='🤖 AI 重新生成';} }

        async function histSendSupp() {
            const convId = histState.convId; const r = histState.record;
            if (!convId || !r) return;
            const input = document.getElementById('histSuppInput');
            const content = input.value.trim(); if (!content) return;

        function _openSheet() {
            document.getElementById('sheetOverlay').style.display = 'block';

            s.classList.add('open'); s.scrollTop = 0;
            document.body.style.overflow = 'hidden';

        function closeDiarySheet() {
            document.getElementById('sheetOverlay').style.display = 'none';
            document.getElementById('diarySheet').classList.remove('open');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDiarySheet(); });

        async function openDiarySheet(dateStr) {
            sheetState.record = null; sheetState.convId = null; sheetState.dateStr = dateStr;

            // 重置面板
            document.getElementById('sheetBodyHint').textContent = '正在加载...';
            document.getElementById('sheetBodyContent').innerHTML =
                '<div style="padding:12px 0;text-align:center"><div class="loading-spinner"></div></div>';
            document.getElementById('sheetBodyActions').innerHTML = '';
            setSt('sheetBodySt', '', '');
            document.getElementById('sheetSuppMsgs').innerHTML = '';
            document.getElementById('sheetSuppSaveRow').style.display = 'none';
            setSt('sheetSuppSt', '', '');
            _setInputEnabled(false);

            _openSheet();

            try {
                const rec = await apiFetch(`/history/daily-records/${dateStr}`);
                sheetState.record = rec;
                sheetState.convId = rec.conversation_id;
                _renderSheetHasRecord(rec);
            } catch (e) {
                _renderSheetNoRecord();
            }
        }

        function _renderSheetHasRecord(rec) {
            document.getElementById('sheetBodyHint').textContent = '直接编辑，不会触发 AI';
            document.getElementById('sheetBodyContent').innerHTML =
                `<textarea class="ep-textarea" id="sheetBodyTA" rows="7" placeholder="日记正文内容...">${escapeHtml(rec.body_text || rec.summary_text || '')}</textarea>`;
            document.getElementById('sheetBodyActions').innerHTML = `
        <button class="btn btn-primary" onclick="sheetSaveBody()" id="sheetSaveBodyBtn">💾 保存正文</button>
        <button class="btn btn-secondary" onclick="sheetRegenBody()" id="sheetRegenBtn">🤖 AI 重新生成</button>`;
            _setInputEnabled(true);
            document.getElementById('sheetSuppInput').placeholder = '输入补充内容...';
        }

        function _renderSheetNoRecord() {
            document.getElementById('sheetBodyHint').textContent = '输入正文后保存，即可为这一天创建日记';
            document.getElementById('sheetBodyContent').innerHTML =
                `<textarea class="ep-textarea" id="sheetBodyTA" rows="7" placeholder="写下这一天发生的事…"></textarea>`;
            document.getElementById('sheetBodyActions').innerHTML =
                `<button class="btn btn-primary" onclick="sheetSaveBody()" id="sheetSaveBodyBtn">💾 保存正文</button>`;
            // 补充先禁用，等正文保存后自动启用
            _setInputEnabled(false);
            document.getElementById('sheetSuppInput').placeholder = '请先保存正文，再来补充';
        }

        function _setInputEnabled(enabled) {
            const i = document.getElementById('sheetSuppInput');
            const b = document.getElementById('sheetSuppSendBtn');
            if (i) i.disabled = !enabled;
            if (b) b.disabled = !enabled;
        }

        // ── 保存正文（有记录/无记录两路径） ──
        async function sheetSaveBody() {
            const ta = document.getElementById('sheetBodyTA');
            const txt = ta ? ta.value.trim() : '';
            if (!txt) { setSt('sheetBodySt', '❌ 正文不能为空', 'err'); return; }

            const btn = document.getElementById('sheetSaveBodyBtn');
            btn.disabled = true; btn.textContent = '保存中...';
            setSt('sheetBodySt', '保存中...', '');

            try {
                if (!sheetState.record) {
                    // 无记录 → 创建
                    const created = await apiFetch('/daily-records/manual', {
                        method: 'POST',
                        body: JSON.stringify({ record_date: sheetState.dateStr, body_text: txt })
                    });
                    sheetState.record = created;
                    sheetState.convId = created.conversation_id;
                    // 刷新整个有记录面板（AI 重建后正文可能有所不同）
                    _renderSheetHasRecord(created);
                    const newTa = document.getElementById('sheetBodyTA');
                    if (newTa && created.body_text) newTa.value = created.body_text;
                    setSt('sheetBodySt', '✅ 日记已创建，结构化数据已同步', 'ok');
                    // 更新 dateStrip 标记
                    _recordDates.add(sheetState.dateStr);
                    buildDateStrip(_recordDates);
                } else {
                    // 有记录 → 更新
                    await apiFetch(`/daily-records/${sheetState.record.id}/body`, {
                        method: 'PUT', body: JSON.stringify({ body_text: txt })
                    });
                    setSt('sheetBodySt', '✅ 已保存，结构化数据已同步', 'ok');
                }
            } catch (e) { setSt('sheetBodySt', '❌ ' + e.message, 'err'); }
            finally {
                const b = document.getElementById('sheetSaveBodyBtn');
                if (b) { b.disabled = false; b.textContent = '💾 保存正文'; }
            }
        }

        // ── AI 重新生成（返回值更新 textarea） ──
        async function sheetRegenBody() {
            const r = sheetState.record; if (!r) return;

            const btn = document.getElementById('sheetRegenBtn');

                if (ta && updated && updated.body_text) ta.value = updated.body_text;
                setSt('sheetBodySt', '✅ 已重新生成，风格已调整', 'ok');
            } catch (e) { setSt('sheetBodySt', '❌ ' + e.message, 'err'); }
            finally { btn.disabled = false; btn.textContent = '🤖 AI 重新生成'; }
        }

        // ── 补充消息 ──
        async function sheetSendSupp() {
            const convId = sheetState.convId; const r = sheetState.record;
            if (!convId || !r) return;

            const content = input.value.trim(); if (!content) return;

            appendMsg('sheetSuppMsgs', 'user', content);

                const resp = await apiFetch(`/conversations/${convId}/messages`, {

            } catch (e) { appendMsg('sheetSuppMsgs', 'system', '发送失败：' + e.message); }
            finally { btn.disabled = false; btn.textContent = '发送'; input.disabled = false; input.focus(); }
        }

        // ── 保存本次补充 ──
        async function sheetSaveSupp() {
            const r = sheetState.record; if (!r) return;
            const btn = document.getElementById('sheetSuppSaveBtn');
            btn.disabled = true; btn.textContent = '处理中...';
            setSt('sheetSuppSt', '重建日记中...', '');
            try {
                const updated = await apiFetch(`/daily-records/${r.id}/supplement`, { method: 'POST', body: JSON.stringify({}) });
                const ta = document.getElementById('sheetBodyTA');
                if (ta && updated && updated.body_text) ta.value = updated.body_text;
                setSt('sheetSuppSt', '✅ 补充已保存，日记已更新', 'ok');
                document.getElementById('sheetSuppSaveRow').style.display = 'none';
            } catch (e) { setSt('sheetSuppSt', '❌ ' + e.message, 'err'); }
            finally { btn.disabled = false; btn.textContent = '✅ 保存本次补充'; }
        }

        // ══════════════════════════════════════════════════════
        //  今日内联面板
        // ══════════════════════════════════════════════════════
        function showTodayEditPanels() {
            const record = todayPageState.todayRecord;
            const conv = todayPageState.conversation;
            if (!record) return;

            document.getElementById('todayInlinePanels').style.display = 'block';
            document.getElementById('todayBodyTA').value = record.body_text || record.summary_text || '';
            setSt('todayBodySt', '', '');

            const suppInput = document.getElementById('todaySuppInput');
            const suppSendBtn = document.getElementById('todaySuppSendBtn');
            if (conv && conv.status === 'completed') {
                suppInput.disabled = false; suppSendBtn.disabled = false;
                suppInput.placeholder = '输入补充内容...';
                document.getElementById('todaySuppMsgs').innerHTML = '';
                document.getElementById('todaySuppSaveRow').style.display = 'none';
                setSt('todaySuppSt', '', '');
            } else {
                suppInput.disabled = true; suppSendBtn.disabled = true;
                suppInput.placeholder = '请先完成今日记录';
            }
            // 隐藏「快速记录」板块
            const qSec = document.getElementById('quickRecordSection');
            const qChips = document.getElementById('quickRecordChips');
            if (qSec) qSec.style.display = 'none';
            if (qChips) qChips.style.display = 'none';
            document.getElementById('todayInlinePanels').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ══════════════════════════════════════════════════════
        //  工具函数
        // ══════════════════════════════════════════════════════
        function appendMsg(containerId, role, content) {
            const c = document.getElementById(containerId); if (!c) return;
            const d = document.createElement('div');
            d.className = 'sp-msg' + (role === 'user' ? ' user' : '');
            const icon = role === 'user' ? '👤' : role === 'ai' ? '🤖' : '⚠️';
            d.innerHTML = `<div class="sp-msg-ico">${icon}</div><div class="sp-msg-bubble">${escapeHtml(content)}</div>`;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        function setSt(id, text, type) {
            const el = document.getElementById(id); if (!el) return;
            el.textContent = text;
            // 保留元素原始基础 class（ep-status 或 sp-status），不强制覆盖
            const baseClass = (el.className.split(' ')[0]) || 'ep-status';
            el.className = baseClass + (type ? ' ' + type : '');
        }
