<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回响 Echo — 登录</title>
    <meta name="description" content="回响 Echo 登录页">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mobile-page mobile-page--login">
    <div class="mobile-stage">
        <div class="login-page">
            <div class="login-card">
                <h1 class="login-title">回响 Echo</h1>
                <p class="login-subtitle">让记录回归对话</p>

                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label for="phone">手机号</label>
                        <input type="text" id="phone" placeholder="请输入手机号" required autocomplete="tel">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary login-btn" id="loginBtn">登 录</button>
                    <div class="login-error" id="loginError"></div>
                </form>

                <div class="login-footer">
                    还没有账号？<a href="#" onclick="alert('请先使用联调台或接口注册账号')">注册</a>
                    · <a href="test-console.html">联调台</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // 已登录则直接跳主页
        if (getToken()) {
            window.location.href = 'today.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const data = await apiLogin(phone, password);
                setToken(data.access_token);
                window.location.href = 'today.html';
            } catch (err) {
                errorEl.textContent = err.message || '登录失败，请检查手机号和密码';
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }
    </script>
</body>
</html>
