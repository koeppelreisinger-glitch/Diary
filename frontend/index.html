<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>回忆 — Echo</title>
    <meta name="description" content="Echo 今日总结与历史记录">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="mobile-page">
    <div class="mobile-stage">

        <!-- 顶栏 -->
        <header class="app-header">
            <div class="app-header-logo">Echo</div>
            <div class="app-header-actions">
                <button class="btn btn-ghost btn-sm" id="refreshBtn" onclick="refreshAll()"
                    style="font-size:18px;padding:4px 8px">↺</button>
                <button class="btn btn-ghost btn-sm" onclick="logout()">退出</button>
            </div>
        </header>

        <div class="has-bottom-nav" style="overflow-y:auto">

            <!-- 春日回忆头图区 -->
            <section class="memory-hero">
                <div class="memory-hero-copy">
                    <div class="memory-hero-kicker" id="todayDateLabel">Memories</div>
                    <h1 id="memGreeting">回忆</h1>
                    <p>在阳光好的时候，读回自己的一天。日记、照片和那些突然留下来的句子，都在这里慢慢发芽。</p>
                </div>
                <div class="memory-sun" aria-hidden="true"></div>
            </section>

            <section class="memory-section memory-search-section">
                <div class="memory-section-head">
                    <div>
                        <div class="memory-section-title">找一段记忆</div>
                        <div class="memory-section-sub">可以搜索一句话、一个人、一件小事。</div>
                    </div>
                </div>
                <div class="memory-search">
                    <input type="search" id="memorySearchInput" placeholder="搜索一句话、一个人、一件小事……"
                        onkeydown="if(event.key==='Enter') applyMemorySearch()">
                    <button class="btn btn-primary btn-sm" onclick="applyMemorySearch()">搜索</button>
                </div>
                <div class="memory-search-hint">回忆页只读回日记和照片；地点、消费、情绪趋势放在寻迹里。</div>
            </section>

            <section class="memory-section">
                <div class="memory-section-head">
                    <div>
                        <div class="memory-section-title">最近一篇日记</div>
                        <div class="memory-section-sub">先从最近的一天开始，慢慢读回自己。</div>
                    </div>
                    <span class="section-row-action" onclick="location.href='today.html'">去记录 →</span>
                </div>
                <div id="latestDiaryContainer">
                    <div class="status-box" style="padding:24px 0">
                        <div class="loading-spinner"></div>
                        <div class="text" style="margin-top:10px;font-size:13px">翻开最近的日记...</div>
                    </div>
                </div>
            </section>

            <section class="memory-section">
                <div class="memory-section-head">
                    <div>
                        <div class="memory-section-title">记忆摘录</div>
                        <div class="memory-section-sub">有些句子，会把人一下子带回那一天。</div>
                    </div>
                    <span class="section-row-action" onclick="shuffleQuotes()">换一批</span>
                </div>
                <div id="quoteStreamContainer"></div>
            </section>

            <section class="memory-section" id="photoTodayRow">
                <div class="memory-section-head">
                    <div>
                        <div class="memory-section-title">照片里的今天</div>
                        <div class="memory-section-sub">有些记忆不是写下来的，是被拍下来的。</div>
                    </div>
                </div>
                <div id="photoTodayContainer"></div>
            </section>

            <section class="memory-section" id="photoStreamRow">
                <div class="memory-section-head">
                    <div>
                        <div class="memory-section-title">记忆相片</div>
                        <div class="memory-section-sub">那些和日记一起留下来的画面。</div>
                    </div>
                </div>
                <div id="photoStreamContainer"></div>
            </section>

            <section class="memory-section">
                <div class="memory-section-head">
                    <div>
                        <div class="memory-section-title">日记时间流</div>
                        <div class="memory-section-sub">一天天往回翻，生活会露出自己的纹理。</div>
                    </div>
                </div>
                <div id="diaryTimelineContainer">
                    <div class="status-box" style="padding:28px 0">
                        <div class="loading-spinner"></div>
                        <div class="text" style="margin-top:10px;font-size:13px">整理日记中...</div>
                    </div>
                </div>
            </section>
        </div>

        <!-- 底部导航 -->
        <nav class="app-bottom-nav">
            <a class="app-nav-item" href="today.html">
                <span class="app-nav-icon">✍️</span>
                <span class="app-nav-label">今日</span>
            </a>
            <a class="app-nav-item active" href="index.html">
                <span class="app-nav-icon">📖</span>
                <span class="app-nav-label">回忆</span>
            </a>
            <a class="app-nav-item" href="trace.html">
                <span class="app-nav-icon">🔍</span>
                <span class="app-nav-label">寻迹</span>
            </a>
            <a class="app-nav-item" href="profile.html">
                <span class="app-nav-icon">👤</span>
                <span class="app-nav-label">我</span>
            </a>
        </nav>

    </div>

    <script src="js/api.js"></script>
    <script src="js/records.js"></script>
    <script>
        if (!requireAuth()) { /* 跳登录 */ }
        else {
            initDateLabel();
            // 并行发起所有初始化请求，显著提升首屏加载速度
            Promise.all([
                init(),
                loadGreeting()
            ]).catch(console.error);
        }

        async function loadGreeting() {
            try {
                const user = await apiFetch('/users/me');
                const nickname = user.nickname || user.phone || '';
                const el = document.getElementById('memGreeting');
                if (el && nickname) el.textContent = nickname + ' 的回忆';
            } catch (e) { /* 静默失败 */ }
        }
    </script>
</body>

</html>
